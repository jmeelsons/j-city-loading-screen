<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>J-City - Loading Screen</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Bahnschrift', 'Comic Sans', 'Chalkboard SE', 'Segoe UI Emoji', cursive, sans-serif;
            background: #0a0a0a;
        }

        .slideshow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            opacity: 0;
            animation: fadeSoft 24s infinite ease-in-out;
            will-change: opacity;
        }

        .slide:nth-child(1)  { animation-delay: 0s;   background-image: url('images/1.jpg');  }
        .slide:nth-child(2)  { animation-delay: 8s;   background-image: url('images/2.jpg');  }
        .slide:nth-child(3)  { animation-delay: 16s;  background-image: url('images/3.jpg');  }
        .slide:nth-child(4)  { animation-delay: 24s;  background-image: url('images/4.jpg');  }
        .slide:nth-child(5)  { animation-delay: 32s;  background-image: url('images/5.jpg');  }
        .slide:nth-child(6)  { animation-delay: 40s;  background-image: url('images/6.jpg');  }
        .slide:nth-child(7)  { animation-delay: 48s;  background-image: url('images/7.jpg');  }
        .slide:nth-child(8)  { animation-delay: 56s;  background-image: url('images/8.jpg');  }
        .slide:nth-child(9)  { animation-delay: 64s;  background-image: url('images/9.jpg');  }
        .slide:nth-child(10) { animation-delay: 72s;  background-image: url('images/10.jpg'); }
        .slide:nth-child(11) { animation-delay: 80s;  background-image: url('images/11.jpg'); }
        .slide:nth-child(12) { animation-delay: 88s;  background-image: url('images/12.jpg'); }
        .slide:nth-child(13) { animation-delay: 96s;  background-image: url('images/13.jpg'); }
        .slide:nth-child(14) { animation-delay: 104s; background-image: url('images/14.jpg'); }
        .slide:nth-child(15) { animation-delay: 112s; background-image: url('images/15.jpg'); }
        .slide:nth-child(16) { animation-delay: 120s; background-image: url('images/16.jpg'); }
        .slide:nth-child(17) { animation-delay: 128s; background-image: url('images/17.jpg'); }
        .slide:nth-child(18) { animation-delay: 136s; background-image: url('images/18.jpg'); }
        .slide:nth-child(19) { animation-delay: 144s; background-image: url('images/19.jpg'); }
        .slide:nth-child(20) { animation-delay: 152s; background-image: url('images/20.jpg'); }
        .slide:nth-child(21) { animation-delay: 160s; background-image: url('images/21.jpg'); }
        .slide:nth-child(22) { animation-delay: 168s; background-image: url('images/22.jpg'); }
        .slide:nth-child(23) { animation-delay: 176s; background-image: url('images/23.jpg'); }
        .slide:nth-child(24) { animation-delay: 184s; background-image: url('images/24.jpg'); }
        .slide:nth-child(25) { animation-delay: 192s; background-image: url('images/25.jpg'); }
        .slide:nth-child(26) { animation-delay: 200s; background-image: url('images/26.jpg'); }
        .slide:nth-child(27) { animation-delay: 208s; background-image: url('images/27.jpg'); }
        .slide:nth-child(28) { animation-delay: 216s; background-image: url('images/28.jpg'); }

        @keyframes fadeSoft {
            0%   { opacity: 0; }
            6%   { opacity: 1; }
            28%  { opacity: 1; }
            36%  { opacity: 0; }
            100% { opacity: 0; }
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(220, 20, 60, 0.3) 0%, rgba(139, 0, 0, 0.2) 100%);
            z-index: 2;
            pointer-events: none;
        }

        .content {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 3;
            text-align: center;
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
            pointer-events: none;
        }

        .fade-in-text {
            font-size: 4.5vw;
            font-weight: bold;
            letter-spacing: 5px;
            animation: appearGlow 3.2s cubic-bezier(0.2, 0.9, 0.4, 1.1) forwards;
            opacity: 0;
            color: white;
            text-shadow: 
                0 0 12px #ff4d6d,
                0 0 25px #dc143c,
                0 0 40px #b22222,
                0 0 55px #8b0000,
                0 0 70px #5a0000;
            background-color: rgba(200, 20, 30, 0.25);
            padding: 20px 50px;
            border-radius: 100px;
            border: 2px solid rgba(220, 20, 60, 0.9);
            box-shadow: 
                0 0 25px rgba(139, 0, 0, 0.6),
                0 0 50px rgba(178, 34, 34, 0.4);
            display: inline-block;
            font-family: inherit;
        }

        @keyframes appearGlow {
            0%   { opacity: 0; transform: scale(0.7); text-shadow: 0 0 0 transparent; letter-spacing: 12px; }
            35%  { opacity: 0.95; transform: scale(1.05); text-shadow: 0 0 25px #ff4d6d, 0 0 50px #dc143c, 0 0 75px #b22222; letter-spacing: 6px; }
            100% { opacity: 1; transform: scale(1); text-shadow: 0 0 12px #ff4d6d, 0 0 28px #dc143c, 0 0 42px #b22222, 0 0 56px #8b0000, 0 0 68px #5a0000; letter-spacing: 5px; }
        }

        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 35%, rgba(220, 20, 60, 0.2) 0%, transparent 35%),
                        radial-gradient(circle at 80% 70%, rgba(200, 30, 50, 0.2) 0%, transparent 40%),
                        radial-gradient(circle at 95% 15%, rgba(139, 0, 0, 0.15) 0%, transparent 50%);
            pointer-events: none;
            z-index: 4;
        }

        .music-player {
            position: fixed;
            top: 30px;
            left: 30px;
            z-index: 10;
            background: rgba(10, 10, 10, 0.75);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            padding: 12px 24px;
            border-radius: 60px;
            border: 1px solid rgba(220, 20, 60, 0.5);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.7);
            color: #f0e6e6;
            font-size: 1.1rem;
            font-weight: 300;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 12px;
            pointer-events: auto;
            transition: opacity 0.3s ease, transform 0.3s ease;
            font-family: 'Bahnschrift', 'Segoe UI', sans-serif;
            max-width: 70vw;
            white-space: nowrap;
            cursor: pointer;
            animation: fadeSlideDown 0.8s cubic-bezier(0.15, 0.9, 0.25, 1) 1.2s both;
        }

        .music-player .track-icon {
            font-size: 1.6rem;
            line-height: 1;
            opacity: 0.8;
        }

        .music-player .track-name {
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 280px;
            display: inline-block;
            background: linear-gradient(90deg, #ff4d6d, #dc143c, #b22222);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 500;
            letter-spacing: 0.3px;
            transition: all 0.25s ease;
        }

        .music-player .track-name.loading {
            opacity: 0.5;
            -webkit-text-fill-color: #ddd;
            background: none;
            color: #ddd;
        }

        @keyframes fadeSlideDown {
            0%   { opacity: 0; transform: translateY(-20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 680px) {
            .fade-in-text {
                font-size: 8vw;
                padding: 14px 30px;
                letter-spacing: 3px;
            }
            .music-player {
                top: 20px;
                left: 20px;
                padding: 10px 18px;
                font-size: 0.95rem;
                max-width: 80vw;
                white-space: nowrap;
            }
            .music-player .track-name {
                max-width: 150px;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            .slide { animation: none; opacity: 0; }
            .slide:first-child { opacity: 1; }
            .fade-in-text { animation: none; opacity: 1; transform: scale(1); }
            .music-player { animation: none; opacity: 1; transform: translateY(0); }
        }

        #gmod-status {
            position: fixed;
            bottom: 30px;
            left: 0;
            width: 100%;
            text-align: center;
            z-index: 20;
            pointer-events: none;
            padding: 0 20px;
            box-sizing: border-box;
            opacity: 0;
            transition: opacity 0.8s ease;
        }

        #gmod-status.visible {
            opacity: 1;
        }

        #gmod-status .status-line {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            padding: 14px 28px;
            border-radius: 60px;
            border: 1px solid rgba(220, 20, 60, 0.25);
            max-width: 600px;
            margin: 0 auto;
            pointer-events: auto;
        }

        #gmod-status .status-value {
            display: none;
        }

        .progress-wrap {
            flex: 1;
            min-width: 140px;
            max-width: 400px;
            height: 6px;
            background: rgba(255, 255, 255, 0.12);
            border-radius: 12px;
            overflow: hidden;
            position: relative;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #dc143c, #b22222, #8b0000);
            border-radius: 12px;
            transition: width 0.4s ease;
        }

        #gmod-status .progress-text {
            display: none;
        }

        @media (max-width: 680px) {
            #gmod-status .status-line {
                padding: 14px 20px;
                border-radius: 30px;
                max-width: 95%;
            }
            .progress-wrap {
                min-width: 100px;
                max-width: 100%;
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <div class="slideshow">
        <div class="slide"></div> <div class="slide"></div> <div class="slide"></div> <div class="slide"></div>
        <div class="slide"></div> <div class="slide"></div> <div class="slide"></div> <div class="slide"></div>
        <div class="slide"></div> <div class="slide"></div> <div class="slide"></div> <div class="slide"></div>
        <div class="slide"></div> <div class="slide"></div> <div class="slide"></div> <div class="slide"></div>
        <div class="slide"></div> <div class="slide"></div> <div class="slide"></div> <div class="slide"></div>
        <div class="slide"></div> <div class="slide"></div> <div class="slide"></div> <div class="slide"></div>
        <div class="slide"></div> <div class="slide"></div> <div class="slide"></div> <div class="slide"></div>
    </div>

    <div class="overlay"></div>

    <div class="content">
        <div class="fade-in-text">J-City</div>
    </div>

    <div class="music-player" id="musicPlayer" role="status" aria-live="polite">
        <span class="track-icon">🎵</span>
        <span class="track-name loading" id="trackDisplay">загрузка...</span>
    </div>

    <div id="gmod-status">
        <div class="status-line">
            <div class="progress-wrap">
                <div class="progress-bar" id="gmProgressBar" style="width: 0%;"></div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            "use strict";

            const TRACK_LIST = [
                { file: 'music/track1.mp3', label: 'Aki - popipo00' },
                { file: 'music/track2.mp3', label: 'EDARUMA - Recent Past' },
                { file: 'music/track3.mp3', label: 'Aphex Twin - Xtal' },
                { file: 'music/track4.mp3', label: 'Aphex Twin - Pulsewidth' },
                { file: 'music/track5.mp3', label: 'Tame Impala - Borderline' },
                { file: 'music/track6.mp3', label: 'Inner Wave - Take 3' },
                { file: 'music/track7.mp3', label: 'HONE - Resonance' },
                { file: 'music/track8.mp3', label: 'Song of saya - Sabbath' },
                { file: 'music/track9.mp3', label: 'Aki - カガミ' },
                { file: 'music/track10.mp3', label: 'Aki - MOOGCiTY' },
            ];

            let currentTrackIndex = 0;
            const audio = new Audio();
            const trackDisplay = document.getElementById('trackDisplay');

            audio.volume = 0.05;

            function updateTrackLabel(label, isLoading) {
                if (isLoading) {
                    trackDisplay.textContent = 'загрузка...';
                    trackDisplay.className = 'track-name loading';
                } else {
                    trackDisplay.textContent = label;
                    trackDisplay.className = 'track-name';
                }
            }

            function playTrack(index) {
                const track = TRACK_LIST[index];
                if (!track) return;
                if (!track.file) {
                    updateTrackLabel('⏸ нет трека', false);
                    return;
                }

                updateTrackLabel('', true);
                audio.pause();
                audio.src = track.file;
                audio.load();

                const playPromise = audio.play();
                if (playPromise !== undefined) {
                    playPromise.catch(() => {
                        updateTrackLabel(track.label + ' (нажми для воспр.)', false);
                    });
                }

                audio.oncanplaythrough = function() {
                    updateTrackLabel(track.label, false);
                };
                audio.onerror = function() {
                    updateTrackLabel('⚠ ' + track.label + ' (ошибка)', false);
                    setTimeout(() => {
                        if (audio.paused || audio.ended) nextTrack();
                    }, 3000);
                };
                audio.onended = function() {
                    nextTrack();
                };
                audio.onstalled = function() {
                    setTimeout(() => {
                        if (audio.paused && !audio.ended) nextTrack();
                    }, 4000);
                };
            }

            function nextTrack() {
                currentTrackIndex = (currentTrackIndex + 1) % TRACK_LIST.length;
                playTrack(currentTrackIndex);
            }

            function playRandomTrack() {
                currentTrackIndex = Math.floor(Math.random() * TRACK_LIST.length);
                playTrack(currentTrackIndex);
            }

            document.getElementById('musicPlayer').addEventListener('click', function() {
                if (audio.paused) {
                    audio.play().catch(() => nextTrack());
                } else {
                    nextTrack();
                }
            });

            if (TRACK_LIST.length > 0 && TRACK_LIST[0].file) {
                setTimeout(playRandomTrack, 400);
            } else {
                updateTrackLabel('нет треков', false);
            }

            document.addEventListener('click', function resumeOnInteraction() {
                if (audio.paused && audio.src) {
                    audio.play().catch(() => {});
                }
                document.removeEventListener('click', resumeOnInteraction);
            }, { once: true });

            setInterval(() => {
                if (audio.ended && audio.src) nextTrack();
            }, 2000);

            const progressBar = document.getElementById('gmProgressBar');
            const statusEl = document.getElementById('gmod-status');

            setTimeout(() => {
                statusEl.classList.add('visible');
            }, 1500);

            window.updateGmodProgress = function(percent) {
                const p = Math.min(100, Math.max(0, percent));
                progressBar.style.width = p + '%';
            };

            let emulationInterval = null;
            let emuPercent = 0;

            function startEmulation() {
                if (emulationInterval) return;
                emuPercent = 0;
                emulationInterval = setInterval(() => {
                    emuPercent += Math.random() * 2.5 + 1.2;
                    if (emuPercent >= 100) {
                        emuPercent = 100;
                        clearInterval(emulationInterval);
                        emulationInterval = null;
                    }
                    window.updateGmodProgress(emuPercent);
                }, 400);
            }

            setTimeout(() => {
                startEmulation();
            }, 4000);

            window.SetFilesTotal = function(total) {
                if (emulationInterval) {
                    clearInterval(emulationInterval);
                    emulationInterval = null;
                }
            };

            window.SetFilesNeeded = function(needed) {
                if (emulationInterval) {
                    clearInterval(emulationInterval);
                    emulationInterval = null;
                }
            };

            window.DownloadingFile = function(filename) {
                if (emulationInterval) {
                    clearInterval(emulationInterval);
                    emulationInterval = null;
                }
            };

            window.SetStatusChanged = function(status) {
                if (emulationInterval) {
                    clearInterval(emulationInterval);
                    emulationInterval = null;
                }
            };

            window.GameDetails = function(servername, serverurl, mapname, maxplayers, steamid, gamemode) {
                if (emulationInterval) {
                    clearInterval(emulationInterval);
                    emulationInterval = null;
                }
                window.updateGmodProgress(10);
            };

            console.log('Garry\'s Mod Loading Screen ready (J-City · RED) — прогресс-бар без надписей');
        })();
    </script>

</body>
</html>
